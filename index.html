<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | QR code component</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    body {background-color: rgb(186, 203, 232);}
    .main{padding:170px;}
    .top{background-color:whitesmoke; max-width: 200px; margin: 0 auto; padding: 10px;border-radius: 10px;max-height: 310px; }
    .Qr img{ width: 200px;max-height: 180px; border-radius: 10px;}
    .Sen h3{font-size: 15px;text-align: center;}
    .Sen p{font-size: 15px;text-align: center;color: rgb(130, 127, 127);}
    .attribution { font-size: 11px; text-align: center;padding-top: 20px;}
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>
  <div class="main">
  <div class="top">
    <div class="Qr">
      <img src="./images/image-qr-code.png" alt="Qr image">
    </div>
    <div class="Sen">
      <h3><b>Improve your front-end skills by building projects</b></h3>
      <p>Scan the QR code to visit Frontend Mentor and take your coding skills to the next level</p>
    </div>
  </div>
  
  
  
  <div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="#">Arathy S</a>.
  </div>
  </div>
</body>
</html>
